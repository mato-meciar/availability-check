name: Check Oppo Find N6 Orange

on:
  schedule:
    - cron: "8,23,38,53 * * * *"
  workflow_dispatch:
    inputs:
      test_discord_only:
        description: "Send a test Discord message only"
        required: false
        default: "false"

jobs:
  check:
    runs-on: ubuntu-slim
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      TEST_DISCORD_ONLY: ${{ github.event.inputs.test_discord_only || 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Make script executable
        run: chmod +x ./check-oppo-orange.sh

      - name: Run availability check
        run: ./check-oppo-orange.sh
